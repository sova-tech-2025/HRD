[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests/unit"]
markers = [
    "e2e: end-to-end tests (require Docker + Telegram accounts)",
    "order: set test execution order (e2e tests)",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "F",     # Pyflakes — unused imports, undefined names, syntax errors
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "I",     # isort — порядок импортов
]
ignore = [
    "E501",  # line too long (контролируется formatter)
    "E711",  # comparison to None (SQLAlchemy использует == None)
    "E712",  # comparison to True/False (SQLAlchemy фильтры)
    "W291",  # trailing whitespace (formatter исправит)
    "W292",  # no newline at end (formatter исправит)
    "W293",  # whitespace before ':' (formatter исправит)
    "F841",  # unused variable (TODO: исправить постепенно)
    "F811",  # redefined while unused (переопределения в handlers)
    "E402",  # module-level import not at top (conditional imports)
    "E722",  # bare except (TODO: исправить постепенно)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # реэкспорты в __init__.py

[tool.ruff.lint.isort]
known-first-party = ["database", "handlers", "keyboards", "middlewares", "states", "utils"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
